server {
    listen 80;
    server_name yourdomain.co.za www.yourdomain.co.za;

    # Certbot will add SSL config here automatically
    # Run: certbot --nginx -d yourdomain.co.za

    # Proxy API requests to .NET
    location /api/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve React SPA — all other requests go to index.html
    location / {
        root   /var/www/wayside/wwwroot;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }
}
